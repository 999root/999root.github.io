<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Hot Beans - Careers</title>
        <link rel="stylesheet" href="style.css">
        <link rel="icon" type="image/x-icon" href="../../content/hotbeans.png">
        <meta name="description" content="Join us and help us create and better and more aesthetically pleasing Internet.">
        <script>
            function updateTitleAndHeader() {
                const jobSelect = document.getElementById("jobSelect");
                const selectedJob = jobSelect.options[jobSelect.selectedIndex].text;
                document.title = "Hot Beans - " + selectedJob;
                document.getElementById("applicationHeader").innerText = selectedJob + " Application";
            }

            function handleSubmit(event) {
                event.preventDefault();
                const form = document.getElementById("applicationForm");
                form.reset();
                const confirmationMessage = document.getElementById("confirmationMessage");
                confirmationMessage.style.display = "block";
            }
        </script>
    </head>
    <body>

        <header>
            <nav>
                <a class="main-logo" href="../index.html"><img src="../../content/hotbeans-white.png" width="60" height="60"></a>
                <span class="list">
                    <a class="links" href="../about/index.html">About Us</a>
                    <a style="text-decoration: underline;" class="links" href="../careers/index.html">Careers</a>
                    <a class="links" href="../contact/index.html">Contact</a>
                    <a class="links" href="../for-employers/index.html">For Employers</a>
                    <a class="links" href="../blog/index.html">Blog</a>
                    <a class="links" href="../faq/index.html">FAQ</a>
                </span>
            </nav>
        </header>

        <div style="padding: 12vh; margin: 12vh; color: #fff;">
            <h1 style="text-align: center; font-size: 50px; font-style: italic;" id="applicationHeader">Applications</h1>
        </div>

        <div class="wave-container">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320">
                <path fill="#FFFFFF" d="M0,160L48,138.7C96,117,192,75,288,85.3C384,96,480,160,576,176C672,192,768,160,864,160C960,160,1056,192,1152,202.7C1248,213,1344,203,1392,197.3L1440,192L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"/>
            </svg>
        </div>

        <section style="background-color: #fff; padding: 20px;  padding-bottom: 10vh;">

            <form id="applicationForm" style="max-width: 600px; margin: 0 auto;" onsubmit="handleSubmit(event)">
                <label for="jobSelect">Select Job Position:</label>
                <select id="jobSelect" style="background-color: #fff; color: black;" name="jobSelect" onchange="updateTitleAndHeader()">
                    <option value="" selected disabled>Select a job</option>
                    <option value="web">Web Developer</option>
                    <option value="frontend">Frontend Developer</option>
                    <option value="backend">Backend Developer</option>
                    <option value="fullstack">Full Stack Developer</option>
                    <option value="blockchain">Blockchain Developer</option>
                    <option value="analyst">Business Analyst</option>
                    <option value="director">Director</option>
                    <option value="finance">Finance Analyst</option>
                </select>

                <label for="name">Full Name:</label>
                <input type="text" id="name" name="name" style="background-color: #fff; color: black;" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" style="background-color: #fff; color: black;" required>

                <label for="phone">Phone Number:</label>
                <input type="tel" id="phone" name="phone" style="background-color: #fff; color: black;" required>

                <label for="resume">Upload Resume:</label>
                <input type="file" id="resume" name="resume" style="background-color: #fff; color: black;" required>

                <label for="coverLetter">Cover Letter:</label>
                <textarea id="coverLetter" name="coverLetter" rows="4" style="background-color: #fff; color: black;" required></textarea>

                <button type="submit">Submit Application</button>
            </form>
            <p id="confirmationMessage" style="display: none; text-align: center; color: green; margin-top: 20px;">Submitted, you will hear from us soon!</p>
        </section>

        <footer>
            <div class="footer-container">
                <div class="footer-info">
                    <h3>Contact Us</h3>
                    <p>Email: info@hotbeanswebdev.com</p>
                    <p>Phone: +44 1480 461800</p>
                    <p>Address: 123 Web Development St, City, Country</p>
                </div>
                <div class="social-media">
                    <h3>Follow Us</h3>
                    <div class="social-icons">
                        <a href="#" class="social-icon"><img src="https://cdn2.iconfinder.com/data/icons/social-media-2285/512/1_Facebook_colored_svg_copy-1024.png" alt="Facebook"></a>
                        <a href="#" class="social-icon"><img src="https://cdn2.iconfinder.com/data/icons/social-media-2285/512/1_Twitter_colored_svg-1024.png" alt="Twitter"></a>
                        <a href="#" class="social-icon"><img src="https://cdn2.iconfinder.com/data/icons/social-media-2285/512/1_Instagram_colored_svg_1-1024.png" alt="Instagram"></a>
                        <a href="#" class="social-icon"><img src="https://cdn2.iconfinder.com/data/icons/social-media-2285/512/1_Linkedin_unofficial_colored_svg-1024.png" alt="LinkedIn"></a>
                    </div>
                </div>
            </div>
            <div class="copyright">
                <p>&copy; 2024 Hot Beans Web Development. All rights reserved.</p>
            </div>
        </footer>

    </body>
</html>
